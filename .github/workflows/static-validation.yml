name: DynamicRacingLine static validation

on:
  push:
  pull_request:

jobs:
  static-validation:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false

      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: '3.12'

      - name: Install Lua parser dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.4
          python -m pip install --upgrade pip
          python -m pip install pytest luaparser

      - name: Python static regression tests
        run: python -m pytest tests -q

      - name: Lua syntax parse
        run: |
          find . -name '*.lua' -not -path './.git/*' -print0 | xargs -0 luac5.4 -p
          python - <<'PY'
          from pathlib import Path
          from luaparser import ast
          root = Path.cwd()
          for path in sorted(root.rglob('*.lua')):
              if '.git' in path.parts:
                  continue
              ast.parse(path.read_text(encoding='utf-8-sig'))
          print('lua parse ok')
          PY

      - name: Lua require path scan
        run: |
          python - <<'PY'
          import re
          from pathlib import Path
          root = Path.cwd()
          missing = []
          for path in sorted(root.rglob('*.lua')):
              if '.git' in path.parts:
                  continue
              text = path.read_text(encoding='utf-8-sig')
              for req in re.findall(r"require\(['\"]([^'\"]+)['\"]\)", text):
                  if req.startswith('src.'):
                      target = root / (req.replace('.', '/') + '.lua')
                      if not target.exists():
                          missing.append((str(path.relative_to(root)), req))
          if missing:
              for src, req in missing:
                  print(f'missing require: {src} -> {req}')
              raise SystemExit(1)
          print('require paths ok')
          PY

      - name: JSON validation
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          root = Path.cwd()
          for path in sorted(root.rglob('*.json')):
              if '.git' in path.parts:
                  continue
              json.loads(path.read_text(encoding='utf-8-sig'))
          print('json ok')
          PY
